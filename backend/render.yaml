services:
  - type: web
    name: TrackSpendAI-api
    runtime: python
    buildCommand: pip install -r requirements.txt && python -c "from sentence_transformers import SentenceTransformer; SentenceTransformer('all-MiniLM-L6-v2')"
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --timeout-keep-alive 120
    envVars:
      - key: GROQ_API_KEY
        sync: false
